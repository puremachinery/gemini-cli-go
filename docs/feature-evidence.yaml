# Evidence for verified feature statuses (done/partial/missing).
# Keep this focused on audited entries in docs/feature-status.yaml.

version: "1.0"
updated_at: "2026-02-02"

features:
  # Authentication
  - feature: "OAuth browser login"
    status: "verified_done"
    runtime_wiring:
      - "internal/auth/google.go (Login with browser redirect + callback server)"
  - feature: "Token persistence"
    status: "verified_done"
    runtime_wiring:
      - "internal/auth/filestore.go (Save/Load/Clear credentials)"
      - "internal/auth/tokenfile.go (schema + encoding)"
  - feature: "Token refresh"
    status: "verified_done"
    runtime_wiring:
      - "internal/auth/google.go (Refresh uses refresh token)"
      - "internal/client/auth.go (refresh on authenticated requests)"
  - feature: "Account email caching"
    status: "verified_done"
    runtime_wiring:
      - "internal/auth/accounts.go (cache + load active account)"
  - feature: "API key auth"
    status: "verified_done"
    runtime_wiring:
      - "cmd/gemini-cli/run.go (GEMINI_API_KEY branch)"
      - "internal/client/gemini.go (API key auth mechanism)"
  - feature: "NO_BROWSER flow"
    status: "verified_done"
    runtime_wiring:
      - "internal/auth/google.go (isNoBrowser + loginWithUserCode user-code flow)"
    notes:
      - "Uses manual device code with PKCE when NO_BROWSER=true."

  # Client
  - feature: "Streaming chat"
    status: "verified_done"
    runtime_wiring:
      - "internal/client/codeassist.go (ChatStream)"
