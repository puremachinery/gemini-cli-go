  - feature: "Gemini API client"
    status: "verified_done"
    runtime_wiring:
      - "internal/client/gemini.go (Gemini API Chat/ChatStream)"
  - feature: "OAuth middleware"
    status: "verified_done"
    runtime_wiring:
      - "internal/client/oauth_transport.go (injects auth headers)"

  # Configuration
  - feature: "Comment-tolerant JSON"
    status: "verified_done"
    runtime_wiring:
